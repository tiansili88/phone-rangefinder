<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111" />
  <title>Phone Rangefinder Card</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>

<div id="rotwrap">

  <!-- Calibration overlay (shown until a px/mm value is saved) -->
  <div id="calibration" class="overlay" hidden>
    <div class="cal-inner">
      <h2>Calibrate</h2>
      <p>Hold a credit card against the screen and drag the slider until the
         orange bar matches the <strong>long side</strong> of the card
         (85.6 mm).</p>
      <div id="cal-card-wrap">
        <div id="cal-card"></div>
      </div>
      <input id="cal-slider" type="range" min="2.5" max="8" step="0.01" value="3.78" />
      <div class="cal-row">
        <span><span id="cal-pxmm">3.78</span> px / mm</span>
        <button id="cal-save" type="button">Save</button>
      </div>
      <p class="cal-note">Saved on this device. Tap “Recalibrate” to redo.</p>
    </div>
  </div>

  <header>
    <h1>Rangefinder Card</h1>
    <button id="recalibrate" type="button">Recalibrate</button>
  </header>

  <div id="main">
    <!-- Settings form (left pane) -->
    <form id="rfform" autocomplete="off">

      <label>Card title
        <input type="text" id="title" value="My Lens" />
      </label>

      <label>Eye offset (cm)
        <input type="number" id="eye" step="0.1" min="3" max="9" value="6.6" />
        <small>Distance between pupil centres.</small>
      </label>

      <label>Arm length (cm)
        <input type="number" id="arm" step="0.5" min="40" max="100" value="70" />
        <small>Eye-to-card distance with arm extended.</small>
      </label>

      <label>Distance units
        <select id="units">
          <option value="feet">Feet</option>
          <option value="meter" selected>Metres</option>
        </select>
      </label>

      <label>Focus distances
        <input type="text" id="dis" value="1, 1.5, 2, 3, 5, 10" />
        <div class="row">
          <button type="button" id="use-defaults">Use defaults for unit</button>
          <small>Comma-separated. ∞ added automatically.</small>
        </div>
      </label>

      <label>Font size
        <select id="font">
          <option value="small">Small</option>
          <option value="medium" selected>Medium</option>
          <option value="large">Large</option>
        </select>
      </label>

      <label class="checkbox">
        <input type="checkbox" id="hfd" checked />
        Include hyperfocal-distance chart
      </label>

      <fieldset id="hfd-fields">
        <legend>Hyperfocal chart</legend>

        <label>Focal length (mm)
          <input type="number" id="foclen" step="1" min="6" max="2000" value="40" />
        </label>

        <label>Max aperture (widest)
          <input type="number" id="maxf" step="0.1" min="0.7" max="32" value="3.5" />
        </label>

        <label>Min aperture (narrowest)
          <input type="number" id="minf" step="1" min="2" max="128" value="22" />
        </label>

        <label>Film / sensor size
          <select id="film">
            <option value="811">Minox (8×11 mm)</option>
            <option value="110">110</option>
            <option value="43">4/3rds</option>
            <option value="aps">APS-C</option>
            <option value="apsh">APS-H</option>
            <option value="135" selected>135 (35 mm)</option>
            <option value="645">6×4.5</option>
            <option value="66">6×6</option>
            <option value="67">6×7</option>
            <option value="69">6×9</option>
            <option value="612">6×12</option>
            <option value="617">6×17</option>
            <option value="45">4×5</option>
            <option value="57">5×7</option>
            <option value="810">8×10</option>
          </select>
        </label>

        <label>Custom CoC (mm, optional)
          <input type="number" id="coc" step="0.001" min="0.001" max="1" placeholder="auto = diag / 1500" />
        </label>
      </fieldset>

      <p class="footer-note">Based on tomchuk.com/rf — re-implemented for phone use.</p>
    </form>

    <!-- Card preview (right pane), rendered at true physical size -->
    <main id="card-stage">
      <div id="card-host"></div>
    </main>
  </div>

</div><!-- /#rotwrap -->

  <script src="app.js?v=4"></script>
</body>
</html>
